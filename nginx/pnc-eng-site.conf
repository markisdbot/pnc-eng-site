# Nginx configuration for P&C Engineering Knowledge Base & Tools Site
# Place this file in /etc/nginx/sites-available/ and symlink to sites-enabled/

server {
    listen 8081;
    server_name _;  # Accept any server name

    # Root directory where the site will be deployed
    root /var/www/pnc-eng-site;

    # Index files
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        image/svg+xml;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Main location block
    location / {
        # Try files in order: exact match, directory, fallback to index.html (SPA routing)
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Error pages
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
